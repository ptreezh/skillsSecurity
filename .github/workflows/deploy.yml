name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy'
        required: true
        default: 'polygonAmoy'
        type: choice
        options:
          - polygonAmoy
          - polygon

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to ${{ inputs.network || 'polygonAmoy' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.network == 'polygon' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test test/contracts/*.test.cjs

      - name: Deploy contracts
        if: github.event_name == 'workflow_dispatch'
        run: |
          npx hardhat run scripts/deployCore.js --network ${{ inputs.network || 'polygonAmoy' }}
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          POLYGON_RPC: ${{ secrets.POLYGON_RPC }}
          POLYGON_AMOY_RPC: ${{ secrets.POLYGON_AMOY_RPC }}

      - name: Verify deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Deployment completed"
          cat deployments/core-latest.json

      - name: Upload deployment artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts-${{ inputs.network || 'polygonAmoy' }}
          path: deployments/
          retention-days: 30

  verify:
    name: Verify on Polygonscan
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.network == 'polygon'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts-${{ inputs.network }}
          path: deployments/

      - name: Verify contracts
        run: |
          echo "Verifying contracts on Polygonscan..."
          # Contract verification would go here
          echo "Verification setup complete"