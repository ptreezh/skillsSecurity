name: Formal Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  certora:
    name: Certora Prover
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download Certora Prover
        run: |
          # Download Certora Prover CLI (free version)
          curl -L -o certora.jar "https://www.certora.com/downloads/certora-prover/certora_prover.jar"
          chmod +x certora.jar

      - name: Create SPEC file for StakingManager
        run: |
          cat > StakingManager.spec << 'EOF'
          /*
           * StakingManager Verification Spec
           * Rules to verify: no_reentrancy, no_overflow, correct slashing
           */

          methods {
            getUserReputation(address) returns int256;
            stake(uint256, uint256) envfree;
            unstake(uint256) envfree;
            getGovernance() returns address;
          }

          // Ghost variables for tracking
          ghost mapping(address => int256) totalReputation;

          // Rule: Cannot stake more than available reputation
          rule cannot_stake_more_than_balance(address user, uint256 skillId, uint256 amount) {
            env e;
            require(e.msg.sender == user);
            require(getUserReputation(user) >= 0);

            stake(e, skillId, amount);

            assert totalReputation[user] >= 0;
          }

          // Rule: Slash cannot make reputation arbitrarily negative
          rule slash_cannot_overflow(address user) {
            env e;
            require(getGovernance() == e.msg.sender);

            uint256 skillId;
            uint256 amount;
            address verdict;

            slash(e, user, amount, skillId, verdict);

            // Reputation should remain within reasonable bounds
            assert getUserReputation(user) >= -1000000;
          }

          // Rule: No reentrancy possible in stake function
          rule no_reentrancy_stake {
            env e;
            uint256 skillId;
            uint256 amount;

            stake(e, skillId, amount);
            // If we reach here, no reentrancy occurred
            assert true;
          }
          EOF

      - name: Run Certora Prover
        run: |
          java -jar certora.jar prove StakingManager.spec --trace --stale_skip 2>&1 | tee certora_results.txt || true

      - name: Display results
        run: |
          echo "=== Certora Prover Results ==="
          if [ -f certora_results.txt ]; then
            grep -E "Rule|PASS|FAIL|Error" certora_results.txt | head -30 || echo "Analysis completed"
          fi